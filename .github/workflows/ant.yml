# This workflow will build a Java project with Ant
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-ant

name: Java CI

on:
  push:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAVEN_GROUP_ID: ${{ secrets.MAVEN_GROUP_ID }}
      MAVEN_SNAPSHOTS_REPOSITORY_ID: ${{ secrets.MAVEN_SNAPSHOTS_REPOSITORY_ID }}
      MAVEN_SNAPSHOTS_REPOSITORY_URL: ${{ secrets.MAVEN_SNAPSHOTS_REPOSITORY_URL }}
      MAVEN_STAGING_REPOSITORY_ID: ${{ secrets.MAVEN_STAGING_REPOSITORY_ID }}
      MAVEN_STAGING_REPOSITORY_URL: ${{ secrets.MAVEN_STAGING_REPOSITORY_URL }}
      
    name: Java CI Build
    steps:
    - uses: actions/checkout@v4
      name: Checkout git
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        server-id: github
        server-username: ${{ github.actor }}
        server-password: ${{ secrets.GITHUB_TOKEN }} 
        
    - name: Pull Java Sources
      run: make sources
      
    - name: Build JAR with Ant
      run: ant jar -noinput -buildfile build.xml
      
    - name: Build JAVADOC with Ant
      run: ant javadoc -noinput -buildfile build.xml
      
    - name: Test with Ant
      run: ant junit -noinput -buildfile build.xml
      
    - name: Split JARs
      run: ./split.sh
      
    - name: Build OSGI with Ant
      run: ant osgi -noinput -buildfile build.xml
      
    - name: Deploy snapshot package
      if: github.event_name == 'pull_request' || github.ref_name != 'master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REF_NAME: ${{ github.ref_name }}
      run: >
        mvn --batch-mode deploy:deploy-file
        -Durl=${MAVEN_SNAPSHOTS_REPOSITORY_URL}
        -DrepositoryId=${MAVEN_SNAPSHOTS_REPOSITORY_ID}
        -Dfile=dist/lib/fastutil-${REF_NAME}-${PROJECT_VERSION}.jar
        -DpomFile=pom.xml
    
    - name: Deploy release package
      if: github.event_name != 'pull_request' && github.ref_name == 'master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REF_NAME: ${{ github.ref_name }}
      run: >
        mvn --batch-mode deploy:deploy-file
        -Durl=${MAVEN_STAGING_REPOSITORY_URL}
        -DrepositoryId=${MAVEN_STAGING_REPOSITORY_ID}
        -Dfile=dist/lib/fastutil-${REF_NAME}-${PROJECT_VERSION}.jar
        -DpomFile=pom.xml
        
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: always() 
      with:
        commit: ${{github.event.action.head_sha}}
        report_paths: '**/reports/TEST-*.xml'
        # Optional: if you want to add PR comments from workflow_run context  
        comment: true
        pr_id: ${{ github.event.action.pull_requests[0].number }}

    - name: Upload JAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fastutil-jar-artifacts
        path: '**/fastutil.*'
        
    - name: Upload Documentation Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fastutil-docs-artifacts
        path: './docs/'

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always() # always run even if the previous step fails
      with:
        name: junit-test-results
        path: '**/reports/TEST-*.xml'
        retention-days: 14
